name: Bunny.net

on:
  push:
    branches: [main]
  workflow_dispatch:

enable-email-notifications: true

concurrency:
  group: "opentofu"
  cancel-in-progress: false

jobs:
  Deploy:
    runs-on: codeberg-tiny
    steps:
      - uses: https://data.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.forgejo/actions/setup-bun
      - uses: https://data.forgejo.org/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: ./.forgejo/actions/setup-opentofu
      - run: tofu init
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUNNYNET_API_KEY: ${{ secrets.BUNNYNET_API_KEY }}
      - run: tofu apply -auto-approve
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUNNYNET_API_KEY: ${{ secrets.BUNNYNET_API_KEY }}
