name: Statichost.eu

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

enable-email-notifications: true

concurrency:
  group: "statichost.eu"
  cancel-in-progress: false

jobs:
  Deploy:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout repository
        uses: https://data.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: https://data.forgejo.org/actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          package-manager-cache: false

      - name: Restore npm cache
        uses: https://data.forgejo.org/actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: npm-cache
        with:
          path: node_modules
          key: ${{ hashFiles('package-lock.json') }}

      - name: Run npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Save npm cache
        if: steps.npm-cache.outputs.cache-hit != 'true'
        uses: https://data.forgejo.org/actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ steps.npm-cache.outputs.cache-primary-key }}

      - name: Build
        run: npm run build

      - name: Zip
        if: ${{ forgejo.event_name == 'push' && forgejo.ref_name == 'main' }}
        run: |
          cd public
          zip -qr "statichost.zip" .

      - name: Drop
        if: ${{ forgejo.event_name == 'push' && forgejo.ref_name == 'main' }}
        run: |
          curl --silent --fail-with-body \
            -X POST "https://builder.statichost.eu/iiro/drop" \
            -H "Authorization: Bearer $STATICHOST_APIKEY" \
            -H "Content-Type: application/zip" \
            -H "Accept: text/plain" \
            --data-binary "@public/statichost.zip"
        env:
          STATICHOST_APIKEY: ${{ secrets.STATICHOST_APIKEY }}
